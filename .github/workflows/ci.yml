name: backend-ci

# La CI backend tourne sur TOUT push et toute pull request, quelle que soit la
# branche ou les chemins modifiés (le code backend est toujours présent dans le
# dépôt et le cache .sqlx permet un build hors-ligne, donc la CI est exécutable
# même pour un push qui ne touche que le frontend).
on:
  push:
  pull_request:

# Annule les exécutions précédentes obsolètes sur la même ref.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Build/lint hors-ligne : on s'appuie sur le cache .sqlx committé.
  SQLX_OFFLINE: "true"

defaults:
  run:
    working-directory: backend

jobs:
  # --- Format + lint (rapides, sans base de données) ----------------------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  # --- Tests (unitaires + intégration) avec une base PostgreSQL ------------
  test:
    name: tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: websitebase
          POSTGRES_USER: app_owner
          POSTGRES_PASSWORD: owner_dev_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_owner -d websitebase"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MIGRATION_URL: postgres://app_owner:owner_dev_pw@localhost:5432/websitebase
      DATABASE_URL: postgres://app_user:app_dev_pw@localhost:5432/websitebase
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Installer sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres --locked

      - name: Créer le rôle applicatif + droits par défaut
        run: |
          PGPASSWORD=owner_dev_pw psql -h localhost -U app_owner -d websitebase -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE app_user LOGIN PASSWORD 'app_dev_pw';
          GRANT USAGE ON SCHEMA public TO app_user;
          ALTER DEFAULT PRIVILEGES FOR ROLE app_owner IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app_user;
          ALTER DEFAULT PRIVILEGES FOR ROLE app_owner IN SCHEMA public
              GRANT USAGE ON TYPES TO app_user;
          SQL

      - name: Appliquer les migrations (rôle propriétaire)
        run: sqlx migrate run --database-url "$MIGRATION_URL"

      - name: Vérifier que le cache .sqlx est à jour
        run: cargo sqlx prepare --check --database-url "$MIGRATION_URL"

      - name: Lancer les tests
        run: cargo test --all-targets --locked

  # --- Audit des advisories RustSec + licences + sources (cargo-deny) -------
  #
  # On utilise cargo-deny (et NON cargo-audit) comme autorité d'audit des
  # advisories. Raison : cargo-audit lit le Cargo.lock brut, qui est un
  # sur-ensemble incluant les dépendances OPTIONNELLES non activées — par ex. le
  # driver MySQL de sqlx, qui tire `rsa` (RUSTSEC-2023-0071). Ces crates ne sont
  # JAMAIS compilées dans notre binaire (PostgreSQL uniquement, vérifié : aucun
  # artefact `rsa`/`sqlx-mysql`), et `cargo auditable` les embarque aussi car il
  # sérialise tout le graphe résolu. cargo-deny, lui, raisonne sur le graphe de
  # features RÉELLEMENT résolu : il ne remonte donc pas ce faux positif, ce qui
  # nous permet de garder une liste `ignore` VIDE (aucun avis masqué).
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check
