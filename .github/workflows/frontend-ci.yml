name: frontend-ci

# La CI ne tourne que sur les changements du frontend.
on:
  push:
    branches: [frontend, main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  # --- Typecheck + lint + audit + tests unitaires + build + anti-fuite -----
  checks:
    name: typecheck + lint + audit + unit + build
    runs-on: ubuntu-latest
    env:
      # Valeurs factices pour le build CI (validées au runtime en prod). Le
      # check anti-fuite vérifie qu'AUCUNE n'atteint le bundle client.
      API_BASE_URL: http://api.invalid
      SESSION_SECRET: ci_build_dummy_secret_at_least_32_chars
      COOKIE_SECURE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --ignore-scripts : aucun script post-install de dépendance n'est
      # exécuté en CI (réduction du risque supply chain).
      - name: Installer les dépendances (lockfile strict)
        run: npm ci --ignore-scripts

      - name: Audit des dépendances (échec si high/critical)
        run: npm audit --audit-level=high

      - name: Typecheck (TypeScript strict)
        run: npx tsc --noEmit

      - name: ESLint (zéro warning toléré)
        run: npx eslint . --max-warnings 0

      - name: Tests unitaires (Vitest)
        run: npx vitest run

      - name: Build de production
        run: npm run build

      - name: Check anti-fuite de secrets dans le bundle client
        run: bash scripts/check-bundle-secrets.sh

  # --- E2E Playwright contre le VRAI backend (Axum + PostgreSQL) ------------
  e2e:
    name: e2e (Playwright + backend Axum)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: websitebase
          POSTGRES_USER: app_owner
          POSTGRES_PASSWORD: owner_dev_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_owner -d websitebase"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      API_BASE_URL: http://localhost:8080
      SESSION_SECRET: ci_e2e_session_secret_at_least_32_chars
      E2E_ADMIN_EMAIL: admin-ci@e2e.example
      E2E_ADMIN_PASSWORD: mot-de-passe-admin-ci-123
    steps:
      - uses: actions/checkout@v4

      # ----- Base de données : rôle DML-only + schéma (comme le compose) ----
      - name: Créer le rôle applicatif + appliquer le schéma
        working-directory: backend
        run: |
          PGPASSWORD=owner_dev_pw psql -h localhost -U app_owner -d websitebase \
            -v ON_ERROR_STOP=1 -f docker/initdb/00-roles.sql
          PGPASSWORD=owner_dev_pw psql -h localhost -U app_owner -d websitebase \
            -v ON_ERROR_STOP=1 -f migrations/20260610000001_init.sql

      # ----- Backend Axum -----
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Compiler le backend (offline sqlx)
        working-directory: backend
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release --locked

      - name: Démarrer le backend
        working-directory: backend
        env:
          APP_BIND_ADDR: 0.0.0.0:8080
          APP_TRUSTED_PROXY_HOPS: "1"
          DATABASE_URL: postgres://app_user:app_dev_pw@localhost:5432/websitebase
          JWT_SECRET: ci_e2e_jwt_secret_at_least_32_bytes_long
          JWT_ISSUER: websitebase
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          COOKIE_SECURE: "false"
          LOG_FILTER: info
        run: |
          ./target/release/websitebase-backend &
          for i in $(seq 1 30); do
            curl -fs http://localhost:8080/health/ready && break
            sleep 1
          done

      # Compte admin pour les tests de la zone d'administration : inscription
      # via l'API puis promotion SQL (le rôle n'est PAS modifiable via l'API,
      # c'est un contrôle de sécurité du backend).
      - name: Créer et promouvoir le compte admin de test
        run: |
          curl -fs -X POST http://localhost:8080/api/v1/auth/register \
            -H 'content-type: application/json' \
            -d "{\"email\":\"$E2E_ADMIN_EMAIL\",\"password\":\"$E2E_ADMIN_PASSWORD\"}" > /dev/null
          PGPASSWORD=owner_dev_pw psql -h localhost -U app_owner -d websitebase \
            -v ON_ERROR_STOP=1 \
            -c "UPDATE users SET role = 'admin' WHERE lower(email) = lower('$E2E_ADMIN_EMAIL');"

      # ----- Frontend -----
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci --ignore-scripts

      - name: Build de production
        run: npm run build

      - name: Installer Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - name: Tests E2E (parcours nominaux + cas d'attaque)
        run: npx playwright test

      - name: Rapport Playwright en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
