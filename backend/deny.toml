# Configuration cargo-deny : contrôle des licences et des advisories de sécurité.
# Exécuter : cargo deny check

[advisories]
# Base RustSec. Échoue sur toute VULNÉRABILITÉ connue.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Avis « unmaintained » (informatifs, PAS des vulnérabilités) : on ne gate que
# sur nos dépendances DIRECTES (que l'on maîtrise), pas sur les deps transitives
# profondes que l'on ne contrôle pas. Ex. `rustls-pemfile` (RUSTSEC-2025-0134)
# est tiré transitivement par `redis` (via `rustls-native-certs`) pour le TLS ;
# c'est un simple wrapper autour de `rustls-pki-types` (lui, maintenu), sans
# faille. On ne peut ni le retirer (feature `tls-rustls` de redis), ni le
# masquer par un `ignore` ad hoc — d'où cette politique, tout en gardant la
# liste `ignore` VIDE (aucune vulnérabilité masquée).
unmaintained = "workspace"
# Aucune dérogation de VULNÉRABILITÉ : la crate `rsa` (RUSTSEC-2023-0071), tirée
# par le driver MySQL optionnel et NON activé de sqlx, n'apparaît pas dans le
# graphe résolu ; `proc-macro-error2` (RUSTSEC-2026-0173) a été éliminé en
# migrant de `validator` vers `garde`.
ignore = []

[licenses]
# Liste blanche de licences permissives compatibles avec une distribution
# commerciale. Toute dépendance sous une autre licence fait échouer le build.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    # Bundle de certificats CA de Mozilla (webpki-roots).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
# Exceptions ponctuelles par crate, si nécessaire (vide par défaut).
exceptions = []

[bans]
# Refuse plusieurs versions majeures d'une même crate (réduit la surface).
multiple-versions = "warn"
wildcards = "deny"
# Crates explicitement interdites (ex. anciennes crates non sûres).
deny = []

[sources]
# N'autorise que crates.io comme registre de paquets.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
