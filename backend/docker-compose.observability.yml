# =============================================================================
# Overlay DEV : monitoring d'API via OpenSearch + OpenSearch Dashboards.
#
# Usage (aucun certificat requis) :
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d --build
#
# Stack d'observabilité locale :
#   - OpenSearch + Dashboards : LOGS (access + events, corrélés par request_id) ;
#   - Prometheus : MÉTRIQUES (scrape de /metrics sur l'API) — séries numériques.
#
# Mode DÉVELOPPEMENT SIMPLE : le plugin de sécurité OpenSearch est DÉSACTIVÉ
# (HTTP, pas d'auth, pas de TLS, pas de certs à générer). C'est volontaire pour
# un panneau de debug local :
#   - OpenSearch n'est PAS exposé sur l'hôte (aucun `ports:`) : joignable
#     uniquement par le backend et Dashboards sur le réseau Docker interne ;
#   - Dashboards (le panneau logs) est exposé sur 127.0.0.1:5601 (opérateur) ;
#   - Prometheus (UI/PromQL) est exposé sur 127.0.0.1:9090 (opérateur) ;
#   - le backend parle au cluster en http:// via OPENSEARCH_ALLOW_INSECURE=true.
#
# ⚠️ En PRODUCTION : cluster managé sécurisé (TLS + auth/mTLS), JAMAIS ce
# compose. Une variante durcie (TLS + plugin de sécurité) est documentée dans
# MONITORING.md (fichiers docker/opensearch/opensearch.yml, certs, etc.).
# =============================================================================

services:
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    environment:
      - discovery.type=single-node
      # Désactive entièrement le plugin de sécurité : HTTP simple, pas d'auth.
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    # Pas de `ports:` : jamais exposé hors du réseau Docker interne.
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    security_opt:
      - "no-new-privileges:true"

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      - api
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # UI/PromQL exposée à l'opérateur uniquement (localhost).
    ports:
      - "127.0.0.1:9090:9090"
    security_opt:
      - "no-new-privileges:true"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch:9200"]'
      # Désactive le plugin de sécurité côté Dashboards (cohérent avec le cluster).
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    # Le panneau de debug, exposé à l'opérateur uniquement (localhost).
    ports:
      - "127.0.0.1:5601:5601"
    security_opt:
      - "no-new-privileges:true"

  api:
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      # Active le monitoring dans l'API (cf. config.rs / MONITORING.md).
      OPENSEARCH_URL: "http://opensearch:9200"
      # Autorise le http EN DEV (cluster sur réseau interne non exposé).
      OPENSEARCH_ALLOW_INSECURE: "true"
      # Credentials factices : la sécurité est désactivée côté cluster, l'en-tête
      # d'auth est ignoré. La config backend exige néanmoins une méthode d'auth.
      OPENSEARCH_USERNAME: "dev"
      OPENSEARCH_PASSWORD: "dev"
      OPENSEARCH_INDEX_PREFIX: "api-logs"

volumes:
  opensearch-data:
  prometheus-data:
